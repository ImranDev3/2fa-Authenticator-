<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Authenticator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
</head>
<body>

  <div class="toast" id="toast"></div>

  <div class="modal-overlay" id="cameraModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Scan QR Code</h3>
        <button class="modal-close" id="camClose" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <video id="cameraFeed" autoplay playsinline muted></video>
        <p class="scan-status" id="camStatus">Point camera at a QR code</p>
      </div>
    </div>
  </div>

  <div class="window">
    <div class="window-body">

      <header>
        <div class="brand">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
          <div>
            <h1 class="brand-name">Authenticator</h1>
            <p class="brand-sub" id="accountCount">0 accounts</p>
          </div>
        </div>
        <button class="theme-btn" id="themeToggle" aria-label="Toggle theme">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </header>

      <main>

        <div class="search-row">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="4.5"/><line x1="12.5" y1="12.5" x2="17" y2="17"/></svg>
          <input type="text" id="searchInput" placeholder="Search accounts..." spellcheck="false" autocomplete="off" />
        </div>

        <div class="account-list" id="accountList">
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <p class="empty-title">No accounts yet</p>
            <p class="empty-sub">Add your first account below</p>
          </div>
        </div>

        <div class="section-divider">
          <span>Add Account</span>
        </div>

        <div class="add-grid">
          <div class="add-card" id="dropZone">
            <div class="add-card-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><rect x="8" y="8" width="8" height="8" rx="1"/><line x1="3" y1="13" x2="8" y2="13"/><line x1="16" y1="13" x2="21" y2="13"/><line x1="13" y1="3" x2="13" y2="8"/><line x1="11" y1="16" x2="11" y2="21"/></svg>
            </div>
            <div class="add-card-title">Scan QR</div>
            <div class="add-card-sub">Drop image or tap to upload</div>
            <input type="file" id="fileInput" accept="image/*" />
            <div class="add-card-actions">
              <button class="btn btn-small" id="cameraBtn">
                <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 14a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h3l1.5-2h5L14 5h3a2 2 0 0 1 2 2z"/><circle cx="9" cy="10.5" r="3"/></svg>
                Camera
              </button>
            </div>
            <div class="add-card-foot"><kbd>Ctrl</kbd> + <kbd>V</kbd> to paste</div>
          </div>

          <div class="add-card card-manual">
            <div class="add-card-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 3l-2 2m-6.61 6.61a5.5 5.5 0 1 1-7.78 7.78 5.5 5.5 0 0 1 7.78-7.78zm0 0L14 8m0 0l2.5 2.5L20 7l-2.5-2.5M14 8l4-4"/></svg>
            </div>
            <div class="add-card-title">Manual Entry</div>
            <div class="input-row">
              <input type="text" id="secretInput" placeholder="Paste secret key..." spellcheck="false" autocomplete="off" />
              <input type="text" id="issuerInput" placeholder="Account name..." spellcheck="false" autocomplete="off" />
              <button class="btn btn-small btn-primary" id="setSecretBtn">Add</button>
            </div>
            <div class="add-card-foot">Base32 secret from your provider</div>
          </div>
        </div>

      </main>

      <footer>
        <p>Secured with Web Crypto API</p>
      </footer>

    </div>
  </div>

  <script src="js/totp.js"></script>
  <script src="js/qr.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
